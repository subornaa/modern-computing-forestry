name: Render and publish book

# Renders the Quarto book with the full R toolchain and deploys the
# result to GitHub Pages on every push to main. No need to commit the
# rendered docs/ — CI rebuilds it from source each time.
#
# ONE-TIME SETUP (repo owner): GitHub → Settings → Pages →
#   "Build and deployment" → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install system libraries for sf / units
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libproj-dev libgeos-dev libudunits2-dev

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # fast precompiled binaries from Posit P3M

      - name: Install R packages (cached between runs)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::readxl
            any::here
            any::knitr
            any::rmarkdown
            any::scales
            any::janitor
            any::sf
            any::leaflet
            any::kableExtra
            any::gt

      - name: Render the book (HTML site only)
        run: quarto render --to html   # PDF is built locally; CI needs no LaTeX

      - name: Upload the rendered site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

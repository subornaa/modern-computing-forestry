project:
  type: book
  output-dir: docs

book:
  title: "Modern Data Analytics for Forestry and Natural Resources"
  subtitle: "Efficient Coding, Data Analysis, and AI-Assisted Debugging"
  author: "Dr. Suborna Ahmed"
  date: today
  cover-image: cover.png
  repo-url: https://github.com/subornaa/modern-computing-forestry
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Front matter"
      chapters:
        - frontmatter/authors.qmd
        - frontmatter/acknowledgements.qmd
        - frontmatter/land-acknowledgment.qmd
        - frontmatter/indigenous-data-sovereignty.qmd
        - frontmatter/accessibility.qmd
        - frontmatter/edi-commitment.qmd
        - frontmatter/how-to-use.qmd
        - datasets.qmd
    - part: "Excel foundations"
      chapters:
        - chapters/01-excel-workbench.qmd
        - chapters/02-excel-clean-summarize.qmd
        - chapters/03-excel-pivot-charts.qmd
    - part: "R foundations"
      chapters:
        - chapters/04-r-getting-started.qmd
        - chapters/05-import-inspect-quarto.qmd
        - chapters/06-dplyr-cleaning.qmd
    - part: "Summarise, combine, visualize"
      chapters:
        - chapters/07-summarise-by-group.qmd
        - chapters/08-joins-reshape.qmd
        - chapters/09-ggplot2.qmd
    - part: "Spatial data & communication"
      chapters:
        - chapters/10-spatial-sf.qmd
        - chapters/11-leaflet-maps.qmd
        - chapters/12-presentations-portfolio.qmd
        - chapters/13-wrapup-final-exam.qmd
    - references.qmd
    - glossary.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    lang: en
    fig-cap-location: bottom
    linkcolor: "#1B4332"
    code-copy: true
    include-after-body: assets/quiz-enhance.html
  pdf:
    output-file: "Modern_Data_Analytics_for_Forestry_and_Natural_Resources"
    documentclass: scrreprt
    papersize: letter
    geometry: margin=1in
    toc: true
    number-sections: true
    fig-cap-location: bottom
    colorlinks: true          # keep dataset/source links visible in print
    pdf-engine: xelatex        # native Unicode handling
    code-block-bg: true
    keep-tex: false
    include-in-header:
      text: |
        % Render chemistry subscripts (e.g., O₃) correctly in print
        \usepackage{newunicodechar}
        \newunicodechar{₂}{\textsubscript{2}}
        \newunicodechar{₃}{\textsubscript{3}}
        \newunicodechar{₅}{\textsubscript{5}}

execute:
  freeze: auto
  warning: true
  error: false
